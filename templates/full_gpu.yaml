name: ~
description: ~
aggregation:
  metrics:
    - duration
    - energy
    - carbon_operational
    - carbon_embodied
    - carbon
    - sci
  type: both
pipeline:
  compute:
    - cpu-microwatts-to-watts
    - dram-microwatts-to-watts
    - host-microwatts-to-watts
    - gpu-microwatts-to-watts
    - sum-scaph-gpu-power
    - duration-to-hours
    - watts-to-kw
    - calculate-energy
    - sci-o
    - mem-bytes-to-gb
    - sci-m
    - sum-carbon
    - sci
initialize:
  plugins:
    cpu-microwatts-to-watts:
      path: builtin
      method: Coefficient
      config:
        input-parameter: cpu_power
        coefficient: "=1/1000000"
        output-parameter: cpu_power_watts

    dram-microwatts-to-watts:
      path: builtin
      method: Coefficient
      config:
        input-parameter: dram_power
        coefficient: "=1/1000000"
        output-parameter: dram_power_watts

    host-microwatts-to-watts:
      path: builtin
      method: Coefficient
      config:
        input-parameter: host_power
        coefficient: "=1/1000000"
        output-parameter: host_power_watts

    gpu-microwatts-to-watts:
      path: builtin
      method: Coefficient
      config:
        input-parameter: gpu_power
        coefficient: "=1/1000000"
        output-parameter: gpu_power_watts

    sum-scaph-gpu-power:
      path: builtin
      method: Sum
      config:
        input-parameters:
          - cpu_power_watts
          - dram_power_watts
          - host_power_watts
          - gpu_power_watts
        output-parameter: node_power_watts

    duration-to-hours:
      path: builtin
      method: Coefficient
      config:
        input-parameter: duration
        coefficient: "=1/3600"
        output-parameter: duration_hours

    watts-to-kw:
      path: builtin
      method: Coefficient
      config:
        input-parameter: node_power_watts
        coefficient: "=1/1000"
        output-parameter: kilowatts

    calculate-energy:
      path: builtin
      method: Multiply
      config:
        input-parameters:
          - duration_hours
          - kilowatts
        output-parameter: energy

    sci-o:
      path: builtin
      method: Multiply
      config:
        input-parameters:
          - grid_carbon_intensity
          - energy
        output-parameter: carbon_operational
      parameter-metadata:
        outputs:
          carbon_operational:
            description: Operational carbon emissions
            unit: gCO2eq
            aggregation-method:
              time: sum
              component: sum

    mem-bytes-to-gb:
      path: builtin
      method: Coefficient
      config:
        input-parameter: mem_allocated
        coefficient: "=1/1073741824"
        output-parameter: memory_gb

    sci-m:
      path: builtin
      method: SciEmbodied
      config:
        lifespan: 157680000
        output-parameter: carbon_embodied
      mapping:
        vCPUs: cpu_allocated
        memory: memory_gb
      parameter-metadata:
        outputs:
          carbon_embodied:
            description: Embodied carbon emissions
            unit: gCO2eq
            aggregation-method:
              time: sum
              component: sum

    sum-carbon:
      path: builtin
      method: Sum
      config:
        input-parameters:
          - carbon_operational
          - carbon_embodied
        output-parameter: carbon

    sci:
      path: builtin
      method: Sci
      config:
        functional-unit: job

tree:
  children:
    ~: ~
